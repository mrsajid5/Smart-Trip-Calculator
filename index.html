<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Trip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="authSection" class="auth-box">
            <button id="loginBtn" class="btn-auth" onclick="googleLogin()">Login with Google</button>
            <div id="userProfile" style="display: none;">
                <span id="userName"></span>
                <button class="btn-logout" onclick="googleLogout()">Logout</button>
            </div>
        </div>

        <h2>Smart Trip Calculator</h2>
        
        <div class="calculator-form">
            <label>Select Country:</label>
            <select id="country">
                <option value="USA">United States ($)</option>
                <option value="UK">United Kingdom (£)</option>
                <option value="Pakistan">Pakistan (PKR)</option>
                <option value="India">India (₹)</option>
                <option value="UAE">UAE (AED)</option>
            </select>

            <label>Select Vehicle:</label>
            <select id="vehicleType">
                <option value="Car">Car</option>
                <option value="Bike">Bike</option>
                <option value="Tractor">Tractor</option>
                <option value="Truck">Truck</option>
                <option value="Van">Van</option>
            </select>

            <label>Distance (km):</label>
            <input type="number" id="distance" placeholder="e.g., 100">

            <label>Mileage (km/liter):</label>
            <input type="number" id="mileage" placeholder="e.g., 15">

            <label>Fuel Price (per unit):</label>
            <input type="number" id="fuelPrice" placeholder="e.g., 1.50">

            <label>Toll/Extra Charges:</label>
            <input type="number" id="toll" placeholder="e.g., 50">

            <button class="btn-calculate" onclick="calculateCost()">Calculate Total Cost</button>
        </div>

        <h3 id="result"></h3>
    </div>
