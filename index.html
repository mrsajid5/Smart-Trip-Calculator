    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtMBMSm35eTg6Dpa2W3S1woGXCK5VVNoo",
            authDomain: "smart-trip-calculator.firebaseapp.com",
            projectId: "smart-trip-calculator",
            storageBucket: "smart-trip-calculator.firebasestorage.app",
            messagingSenderId: "169488130950",
            appId: "1:169488130950:web:d98a1fa9b8f1a40f060207"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const provider = new GoogleAuthProvider();

            window.googleLogin = () => signInWithPopup(auth, provider);
            window.googleLogout = () => signOut(auth);

            onAuthStateChanged(auth, (user) => {
                // Check if elements exist before using them
                const loginBtn = document.getElementById("loginBtn");
                const userProfile = document.getElementById("userProfile");
                const userName = document.getElementById("userName");

                if (user) {
                    if(loginBtn) loginBtn.style.display = "none";
                    if(userProfile) userProfile.style.display = "block";
                    if(userName) userName.innerText = "Hi, " + user.displayName;
                } else {
                    if(loginBtn) loginBtn.style.display = "block";
                    if(userProfile) userProfile.style.display = "none";
                }
            });

            window.calculateCost = function() {
                // Check if inputs exist
                if(!document.getElementById("distance")) { console.error("ID missing!"); return; }
                
                let country = document.getElementById("country").value;
                let vehicle = document.getElementById("vehicleType").value;
                let distance = parseFloat(document.getElementById("distance").value);
                let mileage = parseFloat(document.getElementById("mileage").value);
                let price = parseFloat(document.getElementById("fuelPrice").value);
                let toll = parseFloat(document.getElementById("toll").value) || 0;

                const currencySymbols = {
                    "USA": "$", "UK": "£", "Pakistan": "PKR ",
                    "India": "₹", "Canada": "C$", "Australia": "A$", "UAE": "AED "
                };

                if (distance && mileage && price) {
                    let totalCost = ((distance / mileage) * price) + toll;
                    let symbol = currencySymbols[country];
                    document.getElementById("result").innerText = "Total Trip Cost (" + vehicle + "): " + symbol + totalCost.toFixed(2);
                } else {
                    alert("Please enter all values correctly!");
                }
            }
            console.log("Script loaded successfully!");
        } catch (error) {
            console.error("Critical Error:", error);
            alert("Error in code: " + error.message);
        }
    </script>
