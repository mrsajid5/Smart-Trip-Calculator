<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Trip Calculator</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: white; padding: 30px; border-radius: 12px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #userProfile { margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="mainTitle">Smart Trip Calculator</h2>
        
        <select id="country" onchange="updateUI()">
            <option value="USA">United States (USD)</option>
            <option value="UK">United Kingdom (GBP)</option>
            <option value="Canada">Canada (CAD)</option>
            <option value="UAE">UAE (AED)</option>
            <option value="Saudi">Saudi Arabia (SAR)</option>
        </select>

        <select id="vehicleType">
            <option value="Car">Car</option>
            <option value="Bike">Bike</option>
        </select>

        <input type="number" id="distance" placeholder="Distance (km)">
        <input type="number" id="mileage" placeholder="Mileage (km/l)">
        <input type="number" id="fuelPrice" placeholder="Fuel Price">
        <button id="calcBtn" onclick="calculateCost()">Calculate Total</button>
        <h3 id="result"></h3>
    </div>

    <script>
        // 1. Country & Language Data
        const countryData = {
            "USA": { currency: "$", lang: "en" },
            "UK": { currency: "£", lang: "en" },
            "Canada": { currency: "C$", lang: "en" },
            "UAE": { currency: "AED ", lang: "ar" },
            "Saudi": { currency: "SAR ", lang: "ar" }
        };

        // 2. Translation Dictionary
        const translations = {
            "en": {
                title: "Smart Trip Calculator",
                btn: "Calculate Total",
                dist: "Distance (km)",
                mile: "Mileage (km/l)",
                fuel: "Fuel Price",
                result: "Total Cost: "
            },
            "ar": {
                title: "حاسبة الرحلة الذكية",
                btn: "احسب التكلفة",
                dist: "المسافة (كم)",
                mile: "استهلاك الوقود (كم/لتر)",
                fuel: "سعر الوقود",
                result: "التكلفة الإجمالية: "
            }
        };

        // 3. Update Function
        function updateUI() {
            const country = document.getElementById("country").value;
            const lang = countryData[country].lang;
            const t = translations[lang];

            // UI Elements Update
            document.getElementById("mainTitle").innerText = t.title;
            document.getElementById("calcBtn").innerText = t.btn;
            document.getElementById("distance").placeholder = t.dist;
            document.getElementById("mileage").placeholder = t.mile;
            document.getElementById("fuelPrice").placeholder = t.fuel;
        }

        // 4. Calculation Function
        window.calculateCost = function() {
            const country = document.getElementById("country").value;
            const currency = countryData[country].currency;
            const lang = countryData[country].lang;
            
            let distance = parseFloat(document.getElementById("distance").value);
            let mileage = parseFloat(document.getElementById("mileage").value);
            let price = parseFloat(document.getElementById("fuelPrice").value);

            if (distance && mileage && price) {
                let total = (distance / mileage) * price;
                document.getElementById("result").innerText = translations[lang].result + currency + total.toFixed(2);
            } else {
                alert("Please fill all fields!");
            }
        }

        // Initialize on load
        updateUI();
    </script>
</body>
</html>
