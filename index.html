<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Trip Calculator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { color: #333; margin-bottom: 25px; }

        input, select {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 15px;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: #2a5298; outline: none; }

        button {
            width: 100%;
            padding: 15px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover { background: #1e3c72; transform: translateY(-2px); }

        #result {
            margin-top: 25px;
            font-size: 20px;
            font-weight: 600;
            color: #2a5298;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="mainTitle">Smart Trip Calculator</h2>
        
        <select id="country" onchange="updateUI()">
            <option value="USA">USA ($) - English</option>
            <option value="UK">UK (£) - English</option>
            <option value="Canada">Canada (C$) - English</option>
            <option value="Australia">Australia (A$) - English</option>
            <option value="Germany">Germany (€) - German</option>
            <option value="Switzerland">Switzerland (CHF) - German</option>
            <option value="UAE">UAE (AED) - Arabic</option>
            <option value="Saudi">Saudi Arabia (SAR) - Arabic</option>
        </select>

        <select id="vehicleType">
            <option value="Car">Car</option>
            <option value="Bike">Bike</option>
        </select>

        <input type="number" id="distance" placeholder="Distance (km)">
        <input type="number" id="mileage" placeholder="Mileage (km/l)">
        <input type="number" id="fuelPrice" placeholder="Fuel Price">
        
        <button id="calcBtn" onclick="calculateCost()">Calculate Total</button>
        <h3 id="result"></h3>
    </div>

    <script>
        // High CPM Countries Configuration
        const countryData = {
            "USA": { currency: "$", lang: "en" },
            "UK": { currency: "£", lang: "en" },
            "Canada": { currency: "C$", lang: "en" },
            "Australia": { currency: "A$", lang: "en" },
            "Germany": { currency: "€", lang: "de" },
            "Switzerland": { currency: "CHF ", lang: "de" },
            "UAE": { currency: "AED ", lang: "ar" },
            "Saudi": { currency: "SAR ", lang: "ar" }
        };

        // Multi-language Translations
        const translations = {
            "en": { title: "Smart Trip Calculator", btn: "Calculate Total", dist: "Distance (km)", mile: "Mileage (km/l)", fuel: "Fuel Price", result: "Total Cost: " },
            "ar": { title: "حاسبة الرحلة الذكية", btn: "احسب التكلفة", dist: "المسافة (كم)", mile: "استهلاك الوقود (كم/لتر)", fuel: "سعر الوقود", result: "التكلفة الإجمالية: " },
            "de": { title: "Rechner für intelligente Reisen", btn: "Gesamtkosten berechnen", dist: "Entfernung (km)", mile: "Kilometerstand (km/l)", fuel: "Kraftstoffpreis", result: "Gesamtkosten: " }
        };

        function updateUI() {
            const country = document.getElementById("country").value;
            const lang = countryData[country].lang;
            const t = translations[lang];

            document.getElementById("mainTitle").innerText = t.title;
            document.getElementById("calcBtn").innerText = t.btn;
            document.getElementById("distance").placeholder = t.dist;
            document.getElementById("mileage").placeholder = t.mile;
            document.getElementById("fuelPrice").placeholder = t.fuel;
        }

        window.calculateCost = function() {
            const country = document.getElementById("country").value;
            const currency = countryData[country].currency;
            const lang = countryData[country].lang;
            
            let distance = parseFloat(document.getElementById("distance").value);
            let mileage = parseFloat(document.getElementById("mileage").value);
            let price = parseFloat(document.getElementById("fuelPrice").value);

            if (distance && mileage && price) {
                let total = (distance / mileage) * price;
                document.getElementById("result").innerText = translations[lang].result + currency + total.toFixed(2);
            } else {
                alert("Please fill all fields!");
            }
        }

        updateUI();
    </script>
</body>
</html>
