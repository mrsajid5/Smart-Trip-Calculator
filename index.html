<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Trip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Smart Trip Calculator</h2>
        
        <div>
            <label>Select Your Country:</label><br>
            <select id="country">
                <option value="USA">United States ($)</option>
                <option value="UK">United Kingdom (£)</option>
                <option value="Pakistan">Pakistan (PKR)</option>
                <option value="India">India (₹)</option>
                <option value="Canada">Canada (C$)</option>
                <option value="Australia">Australia (A$)</option>
                <option value="UAE">UAE (AED)</option>
            </select><br><br>

            <label>Distance (km):</label><br>
            <input type="number" id="distance" placeholder="e.g., 100"><br><br>

            <label>Mileage (km/liter):</label><br>
            <input type="number" id="mileage" placeholder="e.g., 15"><br><br>

            <label>Fuel Price (per unit):</label><br>
            <input type="number" id="fuelPrice" placeholder="e.g., 1.50"><br><br>

            <button onclick="calculateCost()">Calculate Cost</button>
        </div>

        <h3 id="result"></h3>
    </div>

    <script>
        function calculateCost() {
            // Dropdown aur inputs ki values utha rahe hain
            let country = document.getElementById("country").value;
            let distance = document.getElementById("distance").value;
            let mileage = document.getElementById("mileage").value;
            let price = document.getElementById("fuelPrice").value;

            // Country ke hisab se currency symbols ki list
            const currencySymbols = {
                "USA": "$",
                "UK": "£",
                "Pakistan": "PKR ",
                "India": "₹",
                "Canada": "C$",
                "Australia": "A$",
                "UAE": "AED "
            };

            if (distance && mileage && price) {
                let totalCost = (distance / mileage) * price;
                
                // Select ki gayi country ka symbol lein
                let symbol = currencySymbols[country];
                
                // Result show karein
                document.getElementById("result").innerText = "Total Trip Cost: " + symbol + totalCost.toFixed(2);
            } else {
                alert("Please enter all values!");
            }
        }
    </script>
</body>
</html>
